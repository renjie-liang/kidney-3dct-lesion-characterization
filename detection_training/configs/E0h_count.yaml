# Variant: E0h_C_hungarian + count regularizer. Suppresses over-prediction (count_mae).
ct_level: L3
mask_strategy: binary
flip_x: true
pad_only: 0
encoder: suprem
label_level: L3_C
hidden_dim: 128
dropout: 0.3
use_checkpoint: true
amp_dtype: fp16
epochs: 30
batch_size: 4
accumulate_steps: 4
lr: 0.0005
weight_decay: 0.01
num_workers: 4
mode: hungarian
hier_weight: 1.0
hier_mode: l1
exists_loss_weight: 1.0
type_loss_weight: 1.0
hungarian_cost_weights:
  w_exists: 1.0
  w_size: 1.0
  w_cyst: 1.0
  w_solid: 1.0
  size_scale: 10.0
hungarian_no_object_weight: 0.1
hungarian_size_loss_weight: 0.1
use_focal_exists: false
use_count_reg: true
use_joint_conf: false
use_label_smooth: false
use_size_weight: false
use_hard_neg: false
count_reg_weight: 0.3
count_reg_variant: soft_l1
